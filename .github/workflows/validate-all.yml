name: AFI Reactor Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate AFI Reactor
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout afi-reactor
        uses: actions/checkout@v4
        with:
          path: afi-reactor

      - name: Checkout afi-core (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: AFI-Protocol/afi-core
          path: afi-core

      - name: Checkout afi-factory (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: AFI-Protocol/afi-factory
          path: afi-factory

      - name: Checkout afi-math (kernel guard dependency)
        uses: actions/checkout@v4
        with:
          repository: AFI-Protocol/afi-math
          path: afi-math

      - name: Checkout afi-config (kernel guard dependency)
        uses: actions/checkout@v4
        with:
          repository: AFI-Protocol/afi-config
          path: afi-config

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: afi-reactor/package-lock.json

      - name: Create required directories
        working-directory: afi-reactor
        run: |
          mkdir -p tmp
          mkdir -p codex
          echo "✅ Created tmp/ and codex/ directories"

      - name: Install and build afi-core
        working-directory: afi-core
        run: |
          npm ci
          npm run build

      # afi-config is a file:../afi-config dependency of afi-reactor, so
      # afi-reactor's `npm ci` triggers afi-config's `prepare` (tsc build).
      # On a bare checkout afi-config has no node_modules, so that hook's `tsc`
      # resolves to an ambient/newer TypeScript on the runner, which
      # hard-errors (TS5107) on afi-config's deprecated
      # `moduleResolution: "Node"` (node10). Install afi-config's own locked
      # toolchain first (mirrors the afi-core step above) so the prepare hook
      # resolves afi-config/node_modules/.bin/tsc, which builds it cleanly.
      - name: Install and build afi-config
        working-directory: afi-config
        run: |
          npm ci
          npm run build

      - name: Install afi-reactor dependencies
        working-directory: afi-reactor
        run: npm ci

      - name: Build
        id: build
        working-directory: afi-reactor
        run: |
          echo "🔨 Building AFI Reactor..."
          npm run build
          echo "✅ Build completed"

      - name: Run tests
        id: test
        working-directory: afi-reactor
        run: |
          echo "🧪 Running AFI Reactor tests..."
          npm test
          echo "✅ Tests completed"

      - name: Ensure all log files exist
        if: always()
        working-directory: afi-reactor
        run: |
          echo "📝 Ensuring required logs exist..."

          # Dummy Codex log
          if [ ! -f "codex/codex.replay.log.json" ]; then
            echo '{"status":"incomplete","isDummyLog":true,"message":"Codex replay missing"}' > codex/codex.replay.log.json
          fi

          # Dummy DAG simulation log
          if [ ! -f "tmp/dag-simulation.log.json" ]; then
            echo '{"status":"incomplete","isDummyLog":true,"message":"DAG simulation missing"}' > tmp/dag-simulation.log.json
          fi

          # Dummy Mentor evaluation log
          if [ ! -f "tmp/mentor-evaluation.json" ]; then
            echo '{"status":"incomplete","isDummyLog":true,"message":"Mentor evaluation missing"}' > tmp/mentor-evaluation.json
          fi

      - name: Upload all validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: afi-reactor-validation-artifacts
          path: |
            afi-reactor/codex/codex.replay.log.json
            afi-reactor/tmp/dag-simulation.log.json
            afi-reactor/tmp/mentor-evaluation.json
          retention-days: 30
