name: AFI Reactor Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate AFI Reactor
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout afi-reactor
        uses: actions/checkout@v4
        with:
          path: afi-reactor

      - name: Checkout afi-core (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: AFI-Protocol/afi-core
          path: afi-core

      - name: Checkout afi-factory (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: AFI-Protocol/afi-factory
          path: afi-factory

      - name: Checkout afi-math (kernel guard dependency)
        uses: actions/checkout@v4
        with:
          repository: AFI-Protocol/afi-math
          path: afi-math

      - name: Checkout afi-config (kernel guard dependency)
        uses: actions/checkout@v4
        with:
          repository: AFI-Protocol/afi-config
          path: afi-config

      # afi-infra (the canonical evidence store the Reactor submits through) is
      # consumed as a REPRODUCIBLE git-pinned package dependency
      # (git+https://github.com/AFI-Protocol/afi-infra.git#<reviewed-sha>; see
      # afi-reactor/package.json + package-lock.json, pinned to the reviewed
      # merged commit). `npm ci` below clones that exact commit and runs its
      # `prepare` build, so no separate checkout is needed. The git-over-HTTPS
      # rewrite step makes that clone work on the keyless runner (public repo,
      # anonymous HTTPS) even though the lockfile records the git+ssh form.

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: afi-reactor/package-lock.json

      - name: Create required directories
        working-directory: afi-reactor
        run: |
          mkdir -p tmp
          mkdir -p codex
          echo "✅ Created tmp/ and codex/ directories"

      - name: Install and build afi-core
        working-directory: afi-core
        run: |
          npm ci
          npm run build

      # afi-config is a file:../afi-config dependency of afi-reactor, so
      # afi-reactor's `npm ci` triggers afi-config's `prepare` (tsc build).
      # On a bare checkout afi-config has no node_modules, so that hook's `tsc`
      # resolves to an ambient/newer TypeScript on the runner, which
      # hard-errors (TS5107) on afi-config's deprecated
      # `moduleResolution: "Node"` (node10). Install afi-config's own locked
      # toolchain first (mirrors the afi-core step above) so the prepare hook
      # resolves afi-config/node_modules/.bin/tsc, which builds it cleanly.
      - name: Install and build afi-config
        working-directory: afi-config
        run: |
          npm ci
          npm run build

      # The afi-infra dependency is pinned as a git URL; the lockfile records the
      # git+ssh form. Rewrite GitHub SSH → HTTPS so `npm ci` clones the PUBLIC
      # afi-infra repo anonymously on the keyless runner (no SSH deploy key).
      - name: Configure git to fetch GitHub dependencies over HTTPS
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install afi-reactor dependencies
        working-directory: afi-reactor
        run: npm ci

      - name: Build
        id: build
        working-directory: afi-reactor
        run: |
          echo "🔨 Building AFI Reactor..."
          npm run build
          echo "✅ Build completed"

      - name: Run tests
        id: test
        working-directory: afi-reactor
        run: |
          echo "🧪 Running AFI Reactor tests..."
          npm test
          echo "✅ Tests completed"

      # Exercise the COMPILED build (dist/), not only Jest source mappings: prove
      # both scored endpoints construct + validate the governed record and then
      # fail HONESTLY with a 503 when the canonical store is unavailable (no
      # MongoDB) — never a masked 200. Runs without a database.
      - name: Compiled honest-unavailable smoke (no MongoDB)
        working-directory: afi-reactor
        timeout-minutes: 8
        run: |
          echo "🧪 Compiled build must fail honestly (503) when the canonical store is unavailable..."
          npm run test:integration:unavailable
          echo "✅ Honest-unavailable smoke passed"

      # Provision REAL MongoDB as a single-node replica set (the production
      # topology; transactions/supersession require a replica set). The Reactor's
      # submit path itself needs only a standard collection + unique index, but
      # the canonical store is exercised against a real replica set here.
      - name: Start MongoDB (single-node replica set)
        run: |
          echo "🍃 Starting MongoDB replica set rs0..."
          docker run -d --name afi-mongo -p 27017:27017 mongo:7 --replSet rs0 --bind_ip_all
          echo "⏳ Waiting for mongod to accept connections..."
          for i in $(seq 1 60); do
            if docker exec afi-mongo mongosh --quiet --eval 'db.runCommand({ ping: 1 })' >/dev/null 2>&1; then break; fi
            sleep 2
          done
          echo "⚙️  Initiating replica set..."
          docker exec afi-mongo mongosh --quiet --eval 'rs.initiate({_id:"rs0",members:[{_id:0,host:"127.0.0.1:27017"}]})'
          echo "⏳ Waiting for PRIMARY..."
          for i in $(seq 1 60); do
            if docker exec afi-mongo mongosh --quiet --eval 'db.hello().isWritablePrimary' 2>/dev/null | grep -q true; then
              echo "✅ Replica set PRIMARY ready"; break
            fi
            sleep 2
          done

      # Real end-to-end persistence PROOF against the compiled build + the real,
      # packaged afi-infra store + real MongoDB: both endpoints construct,
      # validate, and persist afi.scored-signal-evidence.v1; read-back by
      # signalId + identifier continuity; idempotent duplicate; conflicting
      # duplicate (409); and NO dual-write to reactor_scored_signals_v1.
      - name: Real-MongoDB canonical persistence integration (compiled build)
        working-directory: afi-reactor
        timeout-minutes: 12
        env:
          AFI_EVIDENCE_MONGODB_URI: mongodb://127.0.0.1:27017/?replicaSet=rs0
          AFI_EVIDENCE_DB_NAME: afi_scored_signal_evidence_it
          # Deterministic, hermetic enrichment (demo is the default; pinned here
          # so the proof never depends on a live price feed or a runner override).
          AFI_PRICE_FEED_SOURCE: demo
        run: |
          echo "🧪 Proving both scored endpoints persist through the real afi-infra store on real MongoDB..."
          npm run test:integration:mongo
          echo "✅ Real-MongoDB persistence proof passed"

      # Prove SIGTERM-compatible graceful shutdown on the COMPILED server: spawn
      # it listening, connect the evidence store via a scored request, send
      # SIGTERM, and require a prompt clean exit 0 (Cloud Run deployment path).
      - name: SIGTERM graceful-shutdown proof (compiled build)
        working-directory: afi-reactor
        timeout-minutes: 5
        env:
          AFI_EVIDENCE_MONGODB_URI: mongodb://127.0.0.1:27017/?replicaSet=rs0
          AFI_EVIDENCE_DB_NAME: afi_scored_signal_evidence_shutdown_it
          AFI_PRICE_FEED_SOURCE: demo
        run: |
          echo "🧪 Proving SIGTERM → graceful shutdown → exit 0 on the compiled server..."
          npm run test:integration:shutdown
          echo "✅ SIGTERM shutdown proof passed"

      - name: Ensure all log files exist
        if: always()
        working-directory: afi-reactor
        run: |
          echo "📝 Ensuring required logs exist..."

          # Dummy Codex log
          if [ ! -f "codex/codex.replay.log.json" ]; then
            echo '{"status":"incomplete","isDummyLog":true,"message":"Codex replay missing"}' > codex/codex.replay.log.json
          fi

          # Dummy DAG simulation log
          if [ ! -f "tmp/dag-simulation.log.json" ]; then
            echo '{"status":"incomplete","isDummyLog":true,"message":"DAG simulation missing"}' > tmp/dag-simulation.log.json
          fi

          # Dummy Mentor evaluation log
          if [ ! -f "tmp/mentor-evaluation.json" ]; then
            echo '{"status":"incomplete","isDummyLog":true,"message":"Mentor evaluation missing"}' > tmp/mentor-evaluation.json
          fi

      - name: Upload all validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: afi-reactor-validation-artifacts
          path: |
            afi-reactor/codex/codex.replay.log.json
            afi-reactor/tmp/dag-simulation.log.json
            afi-reactor/tmp/mentor-evaluation.json
          retention-days: 30
